 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camp Fanasina 2026</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ==========================================
           1. STYLES GÉNÉRAUX
        ========================================== */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #faf8f5; color: #333; scroll-behavior: smooth; }
        h1, h2, h3 { margin: 0; }
        section { padding: 90px 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .liste-noms { list-style: none; padding: 0; margin: 10px 0 0 0; font-size: 0.9em; text-align: center; }
        .liste-noms li { padding: 3px 0; color: #555; border-bottom: 1px solid #f0f0f0; }

        /* ==========================================
           2. NAVIGATION
        ========================================== */
        nav { background: rgba(18, 18, 18, 0.92); backdrop-filter: blur(16px); position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1000px; border-radius: 50px; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 8px 30px; border: 1px solid rgba(212, 175, 55, 0.4); }
        .nav-logo img { height: 55px; }
        nav ul { list-style: none; display: flex; gap: 30px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #ffffff; font-weight: 700; text-transform: uppercase; font-size: 0.85em; transition: color 0.3s; }
        nav a:hover { color: #d4af37; }
        .burger-btn { display: none; cursor: pointer; border: none; background: transparent; font-size: 1.8em; color: #d4af37; }

        /* ==========================================
           3. SECTION VISION, PROGRAMME & ORGANISATION
        ========================================== */
        #vision { position: relative; width: 100%; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; }
        .video-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #111; }
        .video-wrapper video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.35); }
        .titre-section { text-align: center; color: #222; font-size: 2.8em; margin-bottom: 50px; text-transform: uppercase; }
        .titre-section::after { content: ''; display: block; width: 60px; height: 4px; background-color: #d4af37; margin: 15px auto 0; }

        /* ==========================================
           4. SECTION PLAYLIST
        ========================================== */
        #playlist { background-color: #f4efeb; }
        .playlist-wrapper { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ==========================================
           5. ADAPTATION MOBILE
        ========================================== */
        @media (max-width: 768px) {
            .burger-btn { display: block; }
            nav ul { position: absolute; top: 70px; right: 0; background: #1a1a1a; width: 220px; flex-direction: column; padding: 20px; gap: 20px; display: none; border-radius: 20px; }
            nav ul.mobile-open { display: flex; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#vision" class="nav-logo"><img src="logo_transparent.png" alt="Logo Fanasina"></a>
        <ul id="menu-liens">
            <li><a href="#vision">Vision</a></li>
            <li><a href="#programme">Programme</a></li>
            <li><a href="#playlist">Playlist</a></li>
            <li><a href="#organisation">Organisation</a></li>
            <li><a href="#infos">Infos</a></li>
        </ul>
        <button class="burger-btn" onclick="toggleMenu()">☰</button>
    </nav>

    <section id="vision">
        <div class="video-wrapper"><video autoplay loop muted playsinline><source src="fond_vision.mp4" type="video/mp4"></video></div>
        <div class="vision-content">
            <h1 class="vision-title">CAMP FANASINA 2026</h1>
            <h2 class="vision-theme">"Réveille-Toi : Il est temps...!!"</h2>
        </div>
    </section>

    <!-- [Note: Vous pouvez insérer ici vos sections Programme et Organisation] -->

    <section id="playlist" class="container">
        <h2 class="titre-section">Playlist Fanasina</h2>
        <div class="playlist-wrapper">
            <div class="video-container">
                <!-- IMPORTANT : Remplacez VOTRE_ID_PLAYLIST_ICI -->
                <iframe src="https://www.youtube.com/embed/videoseries?list=VOTRE_ID_PLAYLIST_ICI" allowfullscreen></iframe>
            </div>
            <p style="text-align:center; margin-top: 15px;">Playlist complète (35+ titres)</p>
        </div>
    </section>

    <!-- [Note: Insérez ici vos sections Infos et Footer] -->

    <script>
        function toggleMenu() { document.getElementById('menu-liens').classList.toggle('mobile-open'); }
    </script>
</body>
</html>
